[project]
name = "alpha-app"
version = "0.1.0"
description = "Alpha — the duck in the machine"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.135.0",
    "uvicorn[standard]>=0.32.0",
    "alpha-sdk>=1.0.0a3,<2.0",
    "asyncpg>=0.30.0",
    "pendulum>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_app"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv]
extra-index-url = ["https://pondsiders.github.io/Alpha-SDK/simple/"]

[tool.uv.sources]
alpha-sdk = { path = "../../alpha_sdk-next", editable = true }

[dependency-groups]
dev = [
    "pytest-playwright>=0.7.2",
    "websockets>=14.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "e2e: end-to-end browser tests (require backend + built frontend)",
]
