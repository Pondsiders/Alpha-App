name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      MODE: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      JE_NE_SAIS_QUOI: ${{ github.workspace }}/fixtures/test_jnsq
      WORKING_DIRECTORY: ${{ github.workspace }}/fixtures/test_cwd

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --frozen --group dev

      - run: uv run basedpyright

      - run: uv run pytest -v

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc -b --noEmit

      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10

    env:
      MODE: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      JE_NE_SAIS_QUOI: ${{ github.workspace }}/fixtures/test_jnsq
      WORKING_DIRECTORY: ${{ github.workspace }}/fixtures/test_cwd

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: uv sync --frozen --group dev
        working-directory: backend

      - run: npm ci
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - run: uv run playwright install --with-deps webkit chromium
        working-directory: backend

      - run: uv run pytest tests/e2e/ --browser webkit --browser chromium
        working-directory: backend
