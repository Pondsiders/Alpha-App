# CI — backend unit tests on every PR and push to main.
#
# Fast, no infrastructure: just Python + uv + pytest.
# No Postgres, no Playwright, no Node, no Docker.
# Integration tests are excluded via marker.
#
# Future jobs (when ready):
#   backend-protocol — WebSocket puppeteering with MockAnthropic + Postgres
#   frontend-isolation — Playwright browser tests

name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install backend
        working-directory: backend
        run: uv sync --group dev

      - name: Run unit tests
        working-directory: backend
        run: uv run pytest tests/ -v --ignore=tests/test_e2e.py -k "not integration"
