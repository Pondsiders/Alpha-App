# Garage — S3-compatible object storage for Alpha.
#
# Runs inside the Alpha compose stack, shares the tailscale
# network namespace. Accessible at localhost:3900 from alpha-app.
#
# Data persists to /var/lib/garage/alpha on Primer's NVMe.

metadata_dir = "/data/meta"
data_dir = "/data/data"

# Single node — no replication. Consistent reads.
replication_factor = 1
consistency_mode = "consistent"

# RPC — required even for single node.
rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "4717c3a41027c0f52d6872d1d6aa226e2e98936d4b20db552bb860318b980654"

[s3_api]
s3_region = "pondside"
api_bind_addr = "[::]:3900"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
