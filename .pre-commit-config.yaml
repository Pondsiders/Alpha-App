# Pre-commit hooks. Local enforcement of what CI also runs on push.
# Onboarding: `cd backend && uv sync --dev && uv run pre-commit install`
#
# Per-clone, per-machine: pre-commit's hook lives in .git/hooks/, which
# is never tracked. Run `pre-commit install` once on every clone.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run --directory backend basedpyright
        language: system
        types: [python]
        files: ^backend/src/
        pass_filenames: false
