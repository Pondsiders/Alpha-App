services:
  tailscale:
    image: ghcr.io/tailscale/tailscale:latest
    container_name: alpha-tailscale
    hostname: ${TS_HOSTNAME}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve-config.json
    volumes:
      - alpha-ts-state:/var/lib/tailscale
      - ./tailscale:/config:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    container_name: alpha-postgres
    network_mode: service:tailscale
    depends_on:
      - tailscale
    entrypoint: ["/entrypoint.sh"]
    command: ["postgres",
      "-c", "archive_mode=on",
      "-c", "archive_command=/scripts/archive-wal.sh %p %f",
      "-c", "archive_timeout=300",
      "-c", "wal_level=replica",
      "-c", "max_wal_senders=5",
      "-c", "max_replication_slots=5",
      "-c", "hot_standby=on",
      "-c", "wal_keep_size=1024"]
    env_file: .env
    volumes:
      - /var/lib/postgres/alpha:/var/lib/postgresql/data
      - /mnt/Wilson/wal:/mnt/Wilson/wal
      - ./postgres/entrypoint.sh:/entrypoint.sh:ro
      - ./postgres/archive-wal.sh:/scripts/archive-wal.sh:ro
    restart: unless-stopped

  backup:
    build:
      context: ./backup
    container_name: alpha-backup
    profiles: ["full"]
    network_mode: service:tailscale
    depends_on:
      - tailscale
      - postgres
    env_file: .env
    environment:
      - B2_BUCKET=alpha-yellowstone
      - B2_ENDPOINT=https://s3.us-west-000.backblazeb2.com
    volumes:
      - /mnt/Wilson:/mnt/Wilson
    restart: unless-stopped

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: alpha-garage
    network_mode: service:tailscale
    depends_on:
      - tailscale
    environment:
      - GARAGE_CONFIG_FILE=/etc/garage.toml
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - /var/lib/garage/alpha:/data
    restart: unless-stopped

  alpha:
    build:
      context: .
    container_name: alpha
    profiles: ["full"]
    network_mode: service:tailscale
    depends_on:
      - tailscale
      - garage
      - postgres
    env_file: .env
    environment:
      - CONTAINER=1
    volumes:
      - /Pondside:/Pondside
      - /Pondside/Alpha-Home:/home/alpha
      - /home/jefferyharrell/.config/gws:/home/alpha/.config/gws
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/src:/app/backend/src:ro
      - ./frontend/dist:/app/frontend/dist:ro
    restart: unless-stopped

volumes:
  alpha-ts-state:
    driver: local
