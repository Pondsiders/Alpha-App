# Alpha — the duck in the machine
#
# Deploy on alpha-pi:  docker compose up --build -d
# Deploy on Primer:    uv run alpha  (no Docker, no scheduler)

services:
  alpha:
    build:
      context: .
    container_name: alpha
    ports:
      - "18010:18010"
    env_file: .env
    environment:
      - CONTAINER=1
      - TZ=America/Los_Angeles
    dns:
      - 100.100.100.100
    volumes:
      - /Pondside:/Pondside
      - /Pondside/Basement/Files/certs:/certs:ro
      - ~/.config/gws:/home/alpha/.config/gws
    restart: unless-stopped
