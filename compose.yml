# Alpha — the duck in the machine

services:
  alpha:
    build:
      context: .
    ports:
      - "18010:18010"
    env_file: .env
    environment:
      - HOST_HOSTNAME=${HOSTNAME}
    dns:
      - 100.100.100.100
    volumes:
      - /Pondside:/Pondside
      - /Pondside/Basement/Files/certs:/certs:ro
    restart: unless-stopped
